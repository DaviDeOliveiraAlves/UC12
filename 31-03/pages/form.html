<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    
    <form action="">
        <h2>Formulario de cadastro</h2>
        <label for="nome">Nome</label>
        <input type="text" name="nome" id="">

        <br>

        <label for="email">Email</label>
        <input type="email" name="email" id="">

        <br>

        <label for="senha">Senha</label>
        <input type="password" name="senha" id="">

        <br>

        <label for="escolhas">Escolhas</label>
        <input type="checkbox" name="escolhas" value="js" id="">JS
        <input type="checkbox" name="escolhas" value="html" id="">HTML
        <input type="checkbox" name="escolhas" value="css" id="">CSS

        <br>

        <label for="sexo">Sexo</label>
        <input type="radio" name="sexo" value="masculino" id="">M
        <input type="radio" name="sexo" value="feminino" id="">F

        <br>

        <label for="curso">Curso desejado</label>
        <select name="curso" id="">

            <option value="html">HTML</option>
            <option value="js">JS</option>
            <option value="css">CSS</option>

        </select>

        <label for="mensagem">Mensagem</label>
        <textarea name="mensagem" id="" cols="20" rows="4"></textarea>

        <label for="nascimento">Data de nascimento</label>
        <input type="date" name="nascimento" id="">

        <button type="submit">Enviar</button>


    </form>
</body>
</html>
